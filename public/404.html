<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Redirect all paths to index.html for SPA client-side routing
      var path = window.location.pathname;
      window.location.replace(
        window.location.origin + '/ascendion-industries-prototype/' +
        '?redirect=' + encodeURIComponent(path)
      );
    </script>
  </head>
  <body></body>
</html>
